<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="=UTF-8"> <!--Define a codificação de caracteres da página como UTF-8. Isso permite mostrar corretamente acentos e caracteres especiais como:ç,á,ê,emojis. Sem isso, textos podem aparecer quebrados.-->
    <meta http-equiv="=X-UAR-Compatible" content="IE=edge"> <!--Era usado para forçar o Internet Explorer a usar a versão mais moderna do mecanismo de renderização. Hoje quase não é necessário, porque o Internet Explorer foi descontinuado.-->
    <meta name="viewport" content="Width=device-width, initial-scale=1.0"><!--Faz a página funcionar corretamente em celulares e tablets. width=device-width → largura acompanha a tela do dispositivo initial-scale=1.0 → zoom inicial normal Sem isso, a página pode ficar “miniatura” no celular.-->
    <title>Meu primeiro exercício</title> <!--Define o título da aba do navegador. Exemplo: aparece na aba, aparece nos favoritos, aparece nos resultados de busca-->
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Esse é meu primeiro documento html! Estou Muito Feliz</p>
</body>
